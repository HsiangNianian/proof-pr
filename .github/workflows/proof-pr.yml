name: proof-pr

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: proof-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify commit-bound evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the pull request head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install repository verification tools
        run: python -m pip install ruff==0.14.11

      - name: Run proof-pr
        uses: ./
        with:
          base: ${{ github.event.pull_request.base.sha }}
